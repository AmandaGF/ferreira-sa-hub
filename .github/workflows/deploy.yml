name: Deploy to TurboCloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy on TurboCloud
        run: |
          echo "Triggering deploy..."
          RESPONSE=$(curl -s -L --max-time 120 "https://ferreiraesa.com.br/conecta/deploy2.php?key=fsa-hub-deploy-2026")
          echo "$RESPONSE"
          if echo "$RESPONSE" | grep -q "DEPLOY CONCLUIDO"; then
            echo "Deploy successful!"
          else
            echo "Deploy may have failed - check output above"
            exit 1
          fi
