<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Ícone maskable: fundo cobre tudo; conteúdo importante na safe zone central (~80%) -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#0d3d47"/>
      <stop offset="55%" stop-color="#083039"/>
      <stop offset="100%" stop-color="#041a20"/>
    </radialGradient>
    <linearGradient id="cobre" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c39e"/>
      <stop offset="55%" stop-color="#c78a4e"/>
      <stop offset="100%" stop-color="#a96f33"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- brilho sutil no topo -->
  <ellipse cx="256" cy="118" rx="230" ry="150" fill="#ffffff" opacity="0.05"/>

  <!-- monograma F&S -->
  <g text-anchor="middle" filter="url(#soft)">
    <text x="256" y="288" font-family="Georgia, 'Times New Roman', serif" font-size="196" font-weight="700" fill="url(#cobre)" letter-spacing="-6">F&amp;S</text>
  </g>

  <!-- traço de destaque -->
  <rect x="196" y="322" width="120" height="7" rx="3.5" fill="#c78a4e" opacity="0.9"/>

  <!-- HUB -->
  <text x="256" y="384" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="800"
        text-anchor="middle" fill="#eaf2f1" letter-spacing="14">HUB</text>
</svg>
