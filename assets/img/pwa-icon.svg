<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo completo (safe zone pra maskable cobre até a borda) -->
  <rect width="512" height="512" fill="#052228"/>
  <!-- Conteúdo dentro da safe zone 80% = 102px a 410px -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="900" text-anchor="middle">
    <text x="256" y="230" font-size="150" fill="#d7ab90">F&amp;S</text>
    <text x="256" y="360" font-size="110" fill="#ffffff">HUB</text>
  </g>
  <!-- Pequena linha decorativa dourada -->
  <rect x="156" y="280" width="200" height="4" fill="#B87333" rx="2"/>
</svg>
